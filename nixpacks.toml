[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "python311Packages.supervisor", "nodejs_22", "nginx"]

[phases.install]
cmds = []

[phases.build]
cmds = [
    "mkdir -p /etc/supervisor/conf.d/",
    "cp /assets/worker-nginx.conf /etc/supervisor/conf.d/worker-nginx.conf",
    "cp /assets/worker-phpfpm.conf /etc/supervisor/conf.d/worker-phpfpm.conf",
    "cp /assets/supervisord.conf /etc/supervisord.conf",
    "chmod +x /assets/start.sh",
    "composer install --no-dev --optimize-autoloader",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "/assets/start.sh"

[staticAssets]
"start.sh" = '''
#!/bin/bash
mkdir -p /var/log/nginx
mkdir -p /var/cache/nginx
chown -R www-data:www-data /app/storage /app/bootstrap/cache
chmod -R 775 /app/storage /app/bootstrap/cache
node /assets/scripts/prestart.mjs /assets/nginx.template.conf /etc/nginx.conf
# Fix HTTP 413 on uploads: raise nginx body-size limit to match PHP (50M).
if grep -q "client_max_body_size" /etc/nginx.conf; then
    sed -i 's/client_max_body_size[^;]*;/client_max_body_size 50M;/g' /etc/nginx.conf
else
    sed -i 's/server {/server {\n        client_max_body_size 50M;/' /etc/nginx.conf
fi
php /app/artisan migrate --force
supervisord -c /etc/supervisord.conf -n
'''

"supervisord.conf" = '''
[unix_http_server]
file=/assets/supervisor.sock

[supervisord]
logfile=/var/log/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
pidfile=/assets/supervisord.pid
nodaemon=false
silent=false
minfds=1024
minprocs=200

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///assets/supervisor.sock

[include]
files = /etc/supervisor/conf.d/*.conf
'''

"worker-nginx.conf" = '''
[program:worker-nginx]
process_name=%(program_name)s_%(process_num)02d
command=nginx -c /etc/nginx.conf
autostart=true
autorestart=true
stdout_logfile=/var/log/worker-nginx.log
stderr_logfile=/var/log/worker-nginx.log
'''

"worker-phpfpm.conf" = '''
[program:worker-phpfpm]
process_name=%(program_name)s_%(process_num)02d
command=php-fpm -y /assets/php-fpm.conf -F
autostart=true
autorestart=true
stdout_logfile=/var/log/worker-phpfpm.log
stderr_logfile=/var/log/worker-phpfpm.log
'''

"php-fpm.conf" = '''
[www]
listen = 127.0.0.1:9000
user = www-data
group = www-data
listen.owner = www-data
listen.group = www-data
pm = dynamic
pm.max_children = 50
pm.min_spare_servers = 4
pm.max_spare_servers = 32
pm.start_servers = 18
clear_env = no
php_admin_value[post_max_size] = 50M
php_admin_value[upload_max_filesize] = 50M
'''